<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>納品書</title>

<style>
body{
  margin:0;
  background:#fff;
  color:#000;
  font-family:system-ui;
}

.wrap{
  max-width:900px;
  margin:0 auto;
  padding:12px;
}

.card{
  border:1px solid #000;
  padding:14px;
  margin-bottom:12px;
}

h1{
  font-size:22px;
  margin-bottom:10px;
}

.meta{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  font-size:14px;
}

.meta div{
  border:1px solid #000;
  padding:8px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th, td{
  border:1px solid #000;
  padding:8px;
  font-size:14px;
}

th{
  text-align:center;
}

.num{
  text-align:right;
}

.sign-area{
  margin-top:16px;
}

input{
  width:100%;
  padding:10px;
  border:1px solid #000;
  margin-bottom:8px;
}

canvas{
  width:100%;
  height:200px;
  border:1px solid #000;
}

button{
  width:100%;
  padding:12px;
  border:1px solid #000;
  background:#fff;
  font-weight:700;
}
</style>
</head>

<body>
<div class="wrap">

<div class="card">
  <h1>納品書</h1>
  <div id="noteNo"></div>

  <div class="meta">
    <div>得意先<br><span id="customerName"></span></div>
    <div>担当者<br><span id="contactName"></span></div>
    <div>電話<br><span id="phone"></span></div>
    <div>納品日<br><span id="deliveryDate"></span></div>
    <div style="grid-column:1/-1;">住所<br><span id="address"></span></div>
  </div>
</div>

<div class="card">
  <h2>明細</h2>

  <table>
    <thead>
      <tr>
        <th>商品名</th>
        <th>個数</th>
      </tr>
    </thead>
    <tbody id="itemsTableBody"></tbody>
  </table>

  <div id="signedInfo"></div>
</div>

<div class="card sign-area" id="signArea">
  <h2>受領サイン</h2>

  <input id="receivedBy" placeholder="受領者名">
  <input id="signerName" placeholder="署名者名">

  <canvas id="sigCanvas"></canvas>

  <button onclick="submitSignature()">送信</button>

  <div id="msg"></div>
</div>

</div>

<script>
let noteData = null;
let sigCanvas = null;
let sigCtx = null;
let drawing = false;
let signedOnce = false;

function getToken(){
  return new URL(location.href).searchParams.get('token');
}

function renderHeader(note){
  noteNo.textContent = note.delivery_note_no || '';
  customerName.textContent = note.customer_name || '';
  contactName.textContent = note.contact_name || '';
  phone.textContent = note.phone || '';
  deliveryDate.textContent = (note.delivery_date||'').slice(0,10);
  address.textContent = [note.addr1,note.addr2].filter(Boolean).join(' ');
}

function renderItems(items){
  itemsTableBody.innerHTML = items.map(i=>`
    <tr>
      <td>${i.product_name||''}</td>
      <td class="num">${i.quantity||0}</td>
    </tr>
  `).join('');
}

async function loadNote(){
  const token = getToken();
  if(!token) return;

  const res = await fetch(`/api/dn/delivery-notes/view/${token}`);
  const data = await res.json();

  noteData = data;
  renderHeader(data.delivery_note);
  renderItems(data.items||[]);
}

function initCanvas(){
  sigCanvas = document.getElementById('sigCanvas');
  sigCtx = sigCanvas.getContext('2d');

  sigCanvas.addEventListener('mousedown', ()=>drawing=true);
  sigCanvas.addEventListener('mouseup', ()=>drawing=false);

  sigCanvas.addEventListener('mousemove', e=>{
    if(!drawing) return;
    sigCtx.fillRect(e.offsetX,e.offsetY,2,2);
    signedOnce=true;
  });
}

async function submitSignature(){
  if(!signedOnce) return alert('サインしてください');

  const dataUrl = sigCanvas.toDataURL();

  await fetch(`/api/dn/delivery-notes/${noteData.delivery_note.id}/sign`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      received_by: receivedBy.value,
      signer_name: signerName.value,
      signature_data_url: dataUrl
    })
  });

  msg.textContent='送信しました';
}

initCanvas();
loadNote();
</script>

</body>
</html>
