<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>納品書</title>
  <style>
    *{ box-sizing:border-box; }

    body{
      margin:0;
      background:#fff;
      color:#000;
      font-family:"Yu Gothic","Hiragino Kaku Gothic ProN",Meiryo,sans-serif;
      font-size:14px;
      line-height:1.5;
    }

    .page{
      max-width:980px;
      margin:0 auto;
      padding:16px;
    }

    .sheet{
      border:1px solid #000;
      padding:16px;
    }

    h1,h2,h3,p{
      margin:0;
    }

    .title-row{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:16px;
      padding-bottom:10px;
      border-bottom:2px solid #000;
    }

    .title{
      font-size:28px;
      font-weight:700;
      letter-spacing:.08em;
    }

    .note-no{
      font-size:13px;
      margin-top:6px;
    }

    .status{
      border:1px solid #000;
      padding:6px 10px;
      font-size:12px;
      font-weight:700;
      white-space:nowrap;
    }

    .section{
      margin-top:18px;
    }

    .section-title{
      font-size:16px;
      font-weight:700;
      border-left:6px solid #000;
      padding-left:8px;
      margin-bottom:10px;
    }

    .info-table{
      width:100%;
      border-collapse:collapse;
      table-layout:fixed;
    }

    .info-table th,
    .info-table td{
      border:1px solid #000;
      padding:8px 10px;
      vertical-align:top;
      word-break:break-word;
    }

    .info-table th{
      width:140px;
      background:#fff;
      text-align:left;
      font-weight:700;
    }

    .items-table{
      width:100%;
      border-collapse:collapse;
      table-layout:fixed;
    }

    .items-table th,
    .items-table td{
      border:1px solid #000;
      padding:8px 6px;
      vertical-align:middle;
      word-break:break-word;
    }

    .items-table th{
      text-align:center;
      font-weight:700;
    }

    .num{
      text-align:right;
      white-space:nowrap;
    }

    .totals{
      width:360px;
      margin-left:auto;
      margin-top:12px;
      border-collapse:collapse;
    }

    .totals th,
    .totals td{
      border:1px solid #000;
      padding:8px 10px;
    }

    .totals th{
      text-align:left;
      width:45%;
      font-weight:700;
    }

    .totals td{
      text-align:right;
      font-weight:700;
    }

    .signed-box{
      border:1px solid #000;
      padding:10px;
      margin-top:12px;
    }

    .sign-area{
      margin-top:20px;
      border-top:2px solid #000;
      padding-top:16px;
    }

    .sign-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-bottom:12px;
    }

    label{
      display:block;
      font-weight:700;
      margin-bottom:6px;
    }

    input, textarea, button{
      width:100%;
      font-size:16px;
      font-family:inherit;
    }

    input, textarea{
      border:1px solid #000;
      padding:10px;
      border-radius:0;
      background:#fff;
      color:#000;
    }

    textarea{
      min-height:80px;
      resize:vertical;
    }

    .canvas-wrap{
      border:1px solid #000;
      background:#fff;
    }

    canvas{
      display:block;
      width:100%;
      height:220px;
      background:#fff;
      touch-action:none;
    }

    .canvas-actions{
      display:flex;
      gap:8px;
      padding:8px;
      border-top:1px solid #000;
    }

    button{
      border:1px solid #000;
      border-radius:0;
      background:#fff;
      color:#000;
      padding:10px 12px;
      font-weight:700;
      cursor:pointer;
    }

    button[disabled]{
      opacity:.6;
      cursor:not-allowed;
    }

    .submit-row{
      margin-top:12px;
    }

    .msg{
      margin-top:12px;
      padding:10px;
      border:1px solid #000;
      display:none;
      white-space:pre-wrap;
    }

    .footer-note{
      margin-top:18px;
      border-top:1px solid #000;
      padding-top:10px;
      font-size:12px;
    }

    @media (max-width: 768px){
      .page{
        padding:10px;
      }

      .sheet{
        padding:12px;
      }

      .title-row{
        display:block;
      }

      .title{
        font-size:24px;
      }

      .status{
        display:inline-block;
        margin-top:10px;
      }

      .info-table th,
      .info-table td,
      .items-table th,
      .items-table td{
        font-size:13px;
        padding:7px 5px;
      }

      .sign-grid{
        grid-template-columns:1fr;
      }

      .totals{
        width:100%;
      }

      canvas{
        height:180px;
      }

      .canvas-actions{
        flex-direction:column;
      }
    }

    @media print{
      .page{
        max-width:none;
        padding:0;
      }

      .sheet{
        border:0;
        padding:0;
      }

      .sign-area,
      .msg{
        display:none !important;
      }

      button{
        display:none !important;
      }
    }
  </style>
</head>
<body>
<div class="page">
  <div class="sheet">
    <div class="title-row">
      <div>
        <div class="title">納 品 書</div>
        <div class="note-no" id="noteNo">読込中...</div>
      </div>
      <div class="status" id="statusBadge">発行済み</div>
    </div>

    <div class="section">
      <div class="section-title">納品先情報</div>
      <table class="info-table">
        <tr>
          <th>得意先</th>
          <td id="customerName"></td>
          <th>担当者</th>
          <td id="contactName"></td>
        </tr>
        <tr>
          <th>電話</th>
          <td id="phone"></td>
          <th>納品日</th>
          <td id="deliveryDate"></td>
        </tr>
        <tr>
          <th>住所</th>
          <td colspan="3" id="address"></td>
        </tr>
        <tr>
          <th>備考</th>
          <td colspan="3" id="memo"></td>
        </tr>
      </table>
    </div>

    <div class="section">
      <div class="section-title">明細</div>
      <table class="items-table">
        <thead>
          <tr>
            <th style="width:34%">商品名</th>
            <th style="width:18%">商品コード</th>
            <th style="width:12%">数量</th>
            <th style="width:18%">単価</th>
            <th style="width:18%">金額</th>
          </tr>
        </thead>
        <tbody id="itemsTableBody"></tbody>
      </table>

      <table class="totals">
        <tr>
          <th>小計</th>
          <td id="subtotal"></td>
        </tr>
        <tr>
          <th>消費税</th>
          <td id="taxAmount"></td>
        </tr>
        <tr>
          <th>合計</th>
          <td id="totalAmount"></td>
        </tr>
      </table>

      <div id="signedInfo" class="signed-box" style="display:none;"></div>
    </div>

    <div class="sign-area" id="signArea">
      <div class="section-title">受領確認</div>

      <div class="sign-grid">
        <div>
          <label for="receivedBy">受領者名</label>
          <input id="receivedBy" placeholder="受け取った方のお名前">
        </div>
        <div>
          <label for="signerName">署名者名</label>
          <input id="signerName" placeholder="署名者名">
        </div>
      </div>

      <div>
        <label>サイン</label>
        <div class="canvas-wrap">
          <canvas id="sigCanvas"></canvas>
          <div class="canvas-actions">
            <button type="button" onclick="clearSignature()">サインを消す</button>
          </div>
        </div>
      </div>

      <div class="submit-row">
        <button id="submitBtn" type="button" onclick="submitSignature()">受領確認を送信</button>
      </div>

      <div id="msg" class="msg"></div>
    </div>

    <div class="footer-note">
      本書は電子納品書です。内容をご確認ください。
    </div>
  </div>
</div>

<script>
let noteData = null;
let sigCanvas = null;
let sigCtx = null;
let drawing = false;
let signedOnce = false;

function getToken(){
  const url = new URL(window.location.href);
  return url.searchParams.get('token') || '';
}

function yen(v){
  return Number(v || 0).toLocaleString('ja-JP') + ' 円';
}

function showMsg(text){
  const el = document.getElementById('msg');
  el.style.display = 'block';
  el.textContent = text;
}

function setStatusBadge(status){
  const s = String(status || '').toLowerCase();
  const el = document.getElementById('statusBadge');
  el.textContent = (s === 'signed') ? '受領済み' : '発行済み';
}

function joinAddress(note){
  return [
    note.zip,
    note.pref,
    note.city,
    note.addr1,
    note.addr2
  ].filter(Boolean).join(' ');
}

function renderHeader(note){
  document.getElementById('noteNo').textContent = note.delivery_note_no || '';
  document.getElementById('customerName').textContent = note.customer_name || '―';
  document.getElementById('contactName').textContent = note.contact_name || '―';
  document.getElementById('phone').textContent = note.phone || '―';
  document.getElementById('deliveryDate').textContent = (note.delivery_date || note.issue_date || '').slice(0, 10) || '―';
  document.getElementById('address').textContent = joinAddress(note) || '―';
  document.getElementById('memo').textContent = note.memo || '―';
  setStatusBadge(note.status);
}

function renderItems(items){
  document.getElementById('itemsTableBody').innerHTML = items.map(item => `
    <tr>
      <td>${item.product_name || ''}</td>
      <td>${item.product_code || ''}</td>
      <td class="num">${Number(item.quantity || 0).toLocaleString('ja-JP')}</td>
      <td class="num">${yen(item.unit_price || 0)}</td>
      <td class="num">${yen(item.line_amount || 0)}</td>
    </tr>
  `).join('');
}

function renderTotals(note){
  document.getElementById('subtotal').textContent = yen(note.subtotal || 0);
  document.getElementById('taxAmount').textContent = yen(note.tax_amount || 0);
  document.getElementById('totalAmount').textContent = yen(note.total_amount || 0);
}

function renderReceipt(receipt){
  if (!receipt) return;

  const box = document.getElementById('signedInfo');
  box.style.display = 'block';
  box.innerHTML = `
    <div><strong>受領者:</strong> ${receipt.received_by || ''}</div>
    <div><strong>署名:</strong> ${receipt.signer_name || ''}</div>
    <div><strong>受領時刻:</strong> ${(receipt.received_at || '').replace('T', ' ').slice(0, 19)}</div>
  `;

  document.getElementById('signArea').style.display = 'none';
}

async function loadNote(){
  const token = getToken();
  if (!token) {
    showMsg('token がありません');
    return;
  }

  const res = await fetch(`/api/dn/delivery-notes/view/${encodeURIComponent(token)}`);
  const data = await res.json().catch(() => ({}));

  if (!res.ok || !data.ok) {
    showMsg('納品書の取得に失敗しました');
    return;
  }

  noteData = data;
  renderHeader(data.delivery_note);
  renderItems(data.items || []);
  renderTotals(data.delivery_note);
  renderReceipt(data.receipt);

  if (data.delivery_note?.status === 'signed') {
    document.getElementById('signArea').style.display = 'none';
  }
}

function resizeCanvas(){
  const ratio = window.devicePixelRatio || 1;
  const rect = sigCanvas.getBoundingClientRect();
  sigCanvas.width = rect.width * ratio;
  sigCanvas.height = rect.height * ratio;
  sigCtx.setTransform(ratio, 0, 0, ratio, 0, 0);
  sigCtx.lineWidth = 2;
  sigCtx.lineCap = 'round';
  sigCtx.lineJoin = 'round';
  sigCtx.strokeStyle = '#000';
}

function getPoint(e){
  const rect = sigCanvas.getBoundingClientRect();
  if (e.touches && e.touches[0]) {
    return {
      x: e.touches[0].clientX - rect.left,
      y: e.touches[0].clientY - rect.top
    };
  }
  return {
    x: e.clientX - rect.left,
    y: e.clientY - rect.top
  };
}

function startDraw(e){
  drawing = true;
  signedOnce = true;
  const p = getPoint(e);
  sigCtx.beginPath();
  sigCtx.moveTo(p.x, p.y);
  e.preventDefault();
}

function moveDraw(e){
  if (!drawing) return;
  const p = getPoint(e);
  sigCtx.lineTo(p.x, p.y);
  sigCtx.stroke();
  e.preventDefault();
}

function endDraw(e){
  drawing = false;
  e.preventDefault();
}

function clearSignature(){
  sigCtx.clearRect(0, 0, sigCanvas.width, sigCanvas.height);
  signedOnce = false;
}

async function submitSignature(){
  if (!noteData?.delivery_note?.id) return;

  const receivedBy = document.getElementById('receivedBy').value.trim();
  const signerName = document.getElementById('signerName').value.trim();

  if (!receivedBy) {
    showMsg('受領者名を入力してください');
    return;
  }
  if (!signerName) {
    showMsg('署名者名を入力してください');
    return;
  }
  if (!signedOnce) {
    showMsg('サインを入力してください');
    return;
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '送信中...';

  try {
    const dataUrl = sigCanvas.toDataURL('image/png');

    const res = await fetch(`/api/dn/delivery-notes/${encodeURIComponent(noteData.delivery_note.id)}/sign`, {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({
        received_by: receivedBy,
        signer_name: signerName,
        signature_data_url: dataUrl,
        signed_device: navigator.userAgent
      })
    });

    const data = await res.json().catch(() => ({}));

    if (!res.ok || !data.ok) {
      throw new Error(data.error || 'sign_failed');
    }

    showMsg('受領確認を送信しました');
    await loadNote();
  } catch (e) {
    console.error(e);
    showMsg('送信エラー: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '受領確認を送信';
  }
}

function initCanvas(){
  sigCanvas = document.getElementById('sigCanvas');
  sigCtx = sigCanvas.getContext('2d');

  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  sigCanvas.addEventListener('mousedown', startDraw);
  sigCanvas.addEventListener('mousemove', moveDraw);
  sigCanvas.addEventListener('mouseup', endDraw);
  sigCanvas.addEventListener('mouseleave', endDraw);

  sigCanvas.addEventListener('touchstart', startDraw, { passive:false });
  sigCanvas.addEventListener('touchmove', moveDraw, { passive:false });
  sigCanvas.addEventListener('touchend', endDraw, { passive:false });
}

initCanvas();
loadNote();
</script>
</body>
</html>
